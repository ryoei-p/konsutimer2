<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンスタイマー2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="konchan1.png" type="image/x-icon">
</head>
<body>

  <!-- 終了エフェクト -->
  <canvas id="confetti-canvas"></canvas>
  <div id="flash"></div>
  <div id="end-banner">終了です！🎉</div>

  <!-- テーマパネル -->
  <div id="overlay"></div>
  <div id="theme-panel">
    <button id="panel-close">×</button>
    <h2>テーマカラー</h2>
    <div id="theme-list"></div>
  </div>

  <!-- テーマボタン（左上固定） -->
  <button id="theme-btn" title="テーマ変更">🎨</button>

  <!-- 左下マスコット（タイマー動作中のみ表示） -->
  <div id="mascot-corner">
    <img src="konchan_kirakira.png" class="mascot-slide active" id="mascot-running" alt="">
    <img src="konchan_hatena.png"   class="mascot-slide"        alt="">
    <img src="konchan_idea.png"     class="mascot-slide"        alt="">
    <img src="konchan_finish.png"   class="mascot-slide"        id="mascot-finish" alt="">
  </div>

  <!-- メインレイアウト -->
  <main>

    <!-- タイマー列 -->
    <div id="timer-col">

      <div id="select-wrap">
        <select id="min-select"></select>
        <span class="select-unit">分</span>
      </div>

      <div id="clock">05:00</div>
      <div id="prog-track"><div id="prog-fill"></div></div>
      <div id="status"></div>

      <div id="ctrl-row">
        <button class="ctrl primary" id="start-btn">スタート</button>
        <button class="ctrl hidden"  id="stop-btn">一時停止</button>
        <button class="ctrl hidden"  id="reset-btn">リセット</button>
      </div>
    </div>

    <div id="divider"></div>

    <!-- メモ列 -->
    <div id="memo-col">

      <!-- シートタブ（Excelスタイル） -->
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button id="tab-overflow-btn" title="他のシート">
          ···
          <div id="overflow-menu"></div>
        </button>
        <button id="tab-add" title="シートを追加">＋</button>
      </div>

      <!-- 書式ツールバー（1行コンパクト版） -->
      <div id="toolbar">

        <!-- B / U -->
        <div class="tb-group">
          <button class="fmt-btn" id="fmt-bold"      title="太文字"><b>B</b></button>
          <button class="fmt-btn" id="fmt-underline" title="下線"><u>U</u></button>
        </div>
        <div class="tb-sep"></div>

        <!-- フォントサイズ -->
        <div class="tb-group">
          <span class="tb-label">フォント</span>
          <button class="fmt-btn size-btn" data-size="28px" title="小">小</button>
          <button class="fmt-btn size-btn" data-size="34px" title="中">中</button>
          <button class="fmt-btn size-btn" data-size="44px" title="大">大</button>
        </div>
        <div class="tb-sep"></div>

        <!-- 文字色ドロップダウン -->
        <div class="tb-dropdown" id="color-dd">
          <button class="fmt-btn dd-trigger" id="color-trigger" title="文字色">
            A <span class="dd-bar" id="color-bar" style="background:#1c1a12"></span> ▾
          </button>
          <div class="dd-panel" id="color-panel">
            <div class="dd-grid">
              <button class="color-btn" data-color="#1c1a12" title="黒"      style="background:#1c1a12"></button>
              <button class="color-btn" data-color="#d63030" title="赤"      style="background:#d63030"></button>
              <button class="color-btn" data-color="#f07020" title="オレンジ" style="background:#f07020"></button>
              <button class="color-btn" data-color="#c49a00" title="黄"      style="background:#c49a00"></button>
              <button class="color-btn" data-color="#3a9e4a" title="緑"      style="background:#3a9e4a"></button>
              <button class="color-btn" data-color="#3a8fd4" title="青"      style="background:#3a8fd4"></button>
              <button class="color-btn" data-color="#8840c0" title="紫"      style="background:#8840c0"></button>
              <button class="color-btn" data-color="#888780" title="グレー"  style="background:#888780"></button>
            </div>
          </div>
        </div>
        <div class="tb-sep"></div>

        <!-- 蛍光ペンドロップダウン -->
        <div class="tb-dropdown" id="hl-dd">
          <button class="fmt-btn dd-trigger" id="hl-trigger" title="蛍光ペン">
            <span class="hl-icon">蛍</span> <span class="dd-bar" id="hl-bar" style="background:#ffff00"></span> ▾
          </button>
          <div class="dd-panel" id="hl-panel">
            <div class="dd-grid">
              <button class="color-btn hl-btn" data-hl="#ffff00" title="黄"    style="background:#ffff00"></button>
              <button class="color-btn hl-btn" data-hl="#90ee90" title="緑"    style="background:#90ee90"></button>
              <button class="color-btn hl-btn" data-hl="#87cefa" title="青"    style="background:#87cefa"></button>
              <button class="color-btn hl-btn" data-hl="#ffb6c1" title="ピンク" style="background:#ffb6c1"></button>
              <button class="color-btn hl-btn hl-none" data-hl="transparent" title="解除" style="background:white;border:1.5px solid #ccc;color:#888;font-size:10px;">✕</button>
            </div>
          </div>
        </div>
        <div class="tb-sep"></div>

        <span id="char-count"></span>
        <button id="clear-btn">クリア</button>
      </div>


      <!-- メモ本体 -->
      <div id="memo"
           contenteditable="true"
           spellcheck="false"
           data-placeholder="グループワークの指示・アジェンダなど自由に記入できます">
      </div>
    </div>

  </main>

  <script src="themacolor.js"></script>
  <script src="main.js"></script>
</body>
</html>
